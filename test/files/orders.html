<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Order Cards - Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-6">PDF Bestellungen</h1>

        <!-- Jahr-Selectbox -->
        <div class="bg-white p-4 shadow-md rounded-lg mb-6">
            <label for="year-select" class="block text-sm font-medium text-gray-700 mb-2">Jahr auswählen:</label>
            <select id="year-select" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                <option value="2021">2021</option>
                <option value="2022">2022</option>
                <option value="2023">2023</option>
                <option value="2024">2024</option>
                <option value="2025" selected>2025</option>
            </select>
        </div>

        <!-- Order Cards Container -->
        <div id="orders-container" class="space-y-4">
            <!-- Order Cards werden hier dynamisch eingefügt -->
        </div>

        <!-- Pagination -->
        <div class="flex justify-between items-center mt-6 bg-white p-4 shadow-md rounded-lg">
            <button id="prev" class="bg-blue-500 text-white px-4 py-2 rounded disabled:opacity-50 disabled:cursor-not-allowed"
                disabled>← Vorherige</button>
            <span id="page-number" class="text-lg font-semibold">Seite 1</span>
            <button id="next" class="bg-blue-500 text-white px-4 py-2 rounded">Nächste →</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let currentPage = parseInt(urlParams.get("page")) || 1;
        let currentYear = urlParams.get("year") || "2025";
        const ordersPerPage = 5;

        // Generiere fiktive Bestellungen für jedes Jahr
        function generateOrders(year, count) {
            const orders = [];
            for (let i = 0; i < count; i++) {
                const orderNum = String(i + 1).padStart(3, '0');
                orders.push({
                    id: `305-${year}${orderNum}-${Math.random().toString(36).substr(2, 7)}`,
                    date: `${Math.floor(Math.random() * 28) + 1}. ${['Januar', 'Februar', 'März', 'April', 'Mai', 'Juni', 'Juli', 'August', 'September', 'Oktober', 'November', 'Dezember'][Math.floor(Math.random() * 12)]} ${year}`,
                    pdfs: [
                        `pdf/${year}/rechnung_${orderNum}.pdf`,
                        `pdf/${year}/lieferschein_${orderNum}.pdf`
                    ]
                });
            }
            return orders;
        }

        const ordersByYear = {
            "2021": generateOrders(2021, 25),
            "2022": generateOrders(2022, 30),
            "2023": generateOrders(2023, 28),
            "2024": generateOrders(2024, 32),
            "2025": generateOrders(2025, 20)
        };

        function renderOrders(page, year) {
            const orders = ordersByYear[year] || [];
            const start = (page - 1) * ordersPerPage;
            const end = start + ordersPerPage;
            const container = document.getElementById("orders-container");
            container.innerHTML = "";

            const pageOrders = orders.slice(start, end);
            
            if (pageOrders.length === 0) {
                container.innerHTML = '<div class="bg-white p-8 rounded-lg shadow-md text-center text-gray-500">Keine Bestellungen gefunden</div>';
                return;
            }

            pageOrders.forEach(order => {
                const orderCard = document.createElement("div");
                orderCard.className = "order-card bg-white p-6 rounded-lg shadow-md border border-gray-200 hover:shadow-lg transition-shadow";
                orderCard.dataset.orderId = order.id;
                
                orderCard.innerHTML = `
                    <div class="order-header flex justify-between items-start mb-4 pb-4 border-b border-gray-200">
                        <div>
                            <span class="order-number text-sm text-gray-600">Bestellung: <span class="font-semibold text-gray-900">${order.id}</span></span>
                        </div>
                        <div>
                            <span class="order-date text-sm text-gray-600">${order.date}</span>
                        </div>
                    </div>
                    <div class="order-documents">
                        <h3 class="text-sm font-semibold text-gray-700 mb-2">📄 Dokumente:</h3>
                        <ul class="pdf-list space-y-2">
                            ${order.pdfs.map(pdf => `
                                <li>
                                    <a href="${pdf}" 
                                       target="_blank" 
                                       class="pdf-link text-blue-600 hover:text-blue-800 hover:underline text-sm flex items-center gap-2">
                                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                                            <path d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z"/>
                                        </svg>
                                        ${pdf.split('/').pop()}
                                    </a>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                `;
                
                container.appendChild(orderCard);
            });

            // Update Pagination
            document.getElementById("page-number").textContent = `Seite ${page} von ${Math.ceil(orders.length / ordersPerPage)} (${year})`;
            document.getElementById("prev").disabled = page === 1;
            document.getElementById("next").disabled = page >= Math.ceil(orders.length / ordersPerPage);
        }

        // Jahr-Selectbox initialisieren
        document.getElementById("year-select").value = currentYear;
        document.getElementById("year-select").addEventListener("change", (e) => {
            currentYear = e.target.value;
            currentPage = 1;
            window.location.search = `?page=${currentPage}&year=${currentYear}`;
        });

        document.getElementById("prev").addEventListener("click", () => {
            if (currentPage > 1) {
                currentPage--;
                window.location.search = `?page=${currentPage}&year=${currentYear}`;
            }
        });

        document.getElementById("next").addEventListener("click", () => {
            const orders = ordersByYear[currentYear] || [];
            if (currentPage < Math.ceil(orders.length / ordersPerPage)) {
                currentPage++;
                window.location.search = `?page=${currentPage}&year=${currentYear}`;
            }
        });

        renderOrders(currentPage, currentYear);
    </script>
</body>

</html>
