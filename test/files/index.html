<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Liste mit Pagination</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .order-card {
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            background: #ffffff;
            padding: 16px;
        }

        .order-card:hover {
            border-color: #cbd5e1;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding-bottom: 12px;
            margin-bottom: 12px;
            border-bottom: 1px solid #eef2f7;
        }

        .order-meta {
            display: grid;
            gap: 4px;
        }

        .label {
            font-size: 12px;
            color: #64748b;
        }

        .value {
            font-size: 14px;
            color: #0f172a;
            font-weight: 600;
            word-break: break-word;
        }

        .links {
            display: grid;
            gap: 8px;
        }

        .doc-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #2563eb;
            text-decoration: none;
        }

        .doc-link:hover {
            text-decoration: underline;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 999px;
            background: #f1f5f9;
            color: #0f172a;
            border: 1px solid #e2e8f0;
        }

        .pager {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 40px;
            height: 36px;
            padding: 0 12px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            background: #ffffff;
            color: #334155;
            font-size: 14px;
        }

        .pager:hover {
            background: #0f172a;
            border-color: #0f172a;
            color: #ffffff;
        }

        .pager[disabled] {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pager--active {
            background: #0f172a;
            border-color: #0f172a;
            color: #ffffff;
        }
    </style>
</head>

<body class="bg-gray-100 p-6">
    <div class="max-w-2xl mx-auto bg-white p-4 shadow-md rounded-lg">
        <h1 class="text-2xl font-bold mb-4">Bestellungen (Order Cards) – Testseite</h1>

        <!-- Jahr-Selectbox -->
        <div class="mb-4">
            <label for="year-select" class="block text-sm font-medium text-gray-700 mb-2">Jahr auswählen:</label>
            <select id="year-select" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                <option value="2021">2021</option>
                <option value="2022">2022</option>
                <option value="2023">2023</option>
                <option value="2024">2024</option>
                <option value="2025" selected>2025</option>
            </select>
        </div>

        <div id="orders-container" class="space-y-3">
            <!-- Order Cards werden hier dynamisch eingefügt -->
        </div>

        <div class="flex justify-center mt-6">
            <div class="flex space-x-1" id="pagination">
                <!-- Pagination wird hier dynamisch eingefügt -->
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let currentPage = parseInt(urlParams.get("page")) || 1;
        let currentYear = urlParams.get("year") || "2025";
        const itemsPerPage = parseInt(urlParams.get("itemsPerPage")) || 10;

        function randomSuffix(len = 7) {
            return Math.random().toString(36).slice(2, 2 + len);
        }

        function randomGermanDate(year) {
            const months = ['Januar', 'Februar', 'März', 'April', 'Mai', 'Juni', 'Juli', 'August', 'September', 'Oktober', 'November', 'Dezember'];
            const day = Math.floor(Math.random() * 28) + 1;
            const month = months[Math.floor(Math.random() * months.length)];
            return `${day}. ${month} ${year}`;
        }

        function generateOrders(year, count) {
            const orders = [];
            for (let i = 0; i < count; i++) {
                const orderNum = String(i + 1).padStart(3, '0');
                const orderId = `305-${year}${orderNum}-${randomSuffix(7)}`;
                orders.push({
                    id: orderId,
                    date: randomGermanDate(year),
                    docs: [
                        `pdf/${year}/rechnung_${orderNum}.pdf`,
                        `pdf/${year}/lieferschein_${orderNum}.pdf`
                    ]
                });
            }
            return orders;
        }

        const ordersByYear = {
            "2021": generateOrders(2021, 25),
            "2022": generateOrders(2022, 30),
            "2023": generateOrders(2023, 28),
            "2024": generateOrders(2024, 32),
            "2025": generateOrders(2025, 20)
        };

        function renderPage(page, year) {
            const orders = ordersByYear[year] || [];
            const start = (page - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const container = document.getElementById("orders-container");
            container.innerHTML = "";

            orders.slice(start, end).forEach(order => {
                // Wichtig für den Test-Scraper:
                // - `.order-card.js-order-card` als Container
                // - `.order-header ...` für Datum
                // - `a[href*='/invoice/popover']` mit `orderId=...`
                const card = document.createElement("div");
                card.className = "order-card js-order-card";
                card.dataset.orderId = order.id;

                const invoiceHref = `/invoice/popover?orderId=${encodeURIComponent(order.id)}&ref=ppx_yo_dt_b_invoice`;

                card.innerHTML = `
                    <div class="order-header">
                        <div class="order-meta">
                            <div class="label">Bestellung</div>
                            <div class="value">${order.id}</div>
                        </div>
                        <div class="order-meta" style="text-align:right">
                            <div class="label">Bestellung aufgegeben</div>
                            <div class="a-size-base a-color-secondary aok-break-word">${order.date}</div>
                        </div>
                    </div>

                    <div class="links">
                        <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
                            <span class="tag">orderId in href</span>
                            <a class="doc-link" href="${invoiceHref}" target="_blank" rel="noopener">Invoice Popover</a>
                        </div>

                        <div class="label" style="margin-top:4px;">Dokumente</div>
                        ${order.docs.map(doc => {
                            const name = doc.split('/').pop();
                            return `<a class="doc-link" href="${doc}" target="_blank" rel="noopener">${name}</a>`;
                        }).join('')}
                    </div>
                `;

                container.appendChild(card);
            });

            renderPagination(page, year);
        }

        function renderPagination(page, year) {
            const orders = ordersByYear[year] || [];
            const totalPages = Math.max(1, Math.ceil(orders.length / itemsPerPage));
            const pagination = document.getElementById("pagination");
            pagination.innerHTML = "";

            // Prev Button
            const prevBtn = document.createElement("button");
            prevBtn.className = "pager";
            prevBtn.textContent = "Prev";
            prevBtn.disabled = page === 1;
            prevBtn.addEventListener("click", () => {
                if (page > 1) {
                    window.location.search = `?page=${page - 1}&year=${year}&itemsPerPage=${itemsPerPage}`;
                }
            });
            pagination.appendChild(prevBtn);

            // Page Number Buttons
            for (let i = 1; i <= totalPages; i++) {
                const pageBtn = document.createElement("button");
                pageBtn.className = i === page ? "pager pager--active" : "pager";
                pageBtn.textContent = i;
                pageBtn.addEventListener("click", () => {
                    window.location.search = `?page=${i}&year=${year}&itemsPerPage=${itemsPerPage}`;
                });
                pagination.appendChild(pageBtn);
            }

            // Next Button
            const nextBtn = document.createElement("button");
            nextBtn.className = "pager";
            nextBtn.textContent = "Next";
            nextBtn.disabled = page === totalPages;
            nextBtn.addEventListener("click", () => {
                if (page < totalPages) {
                    window.location.search = `?page=${page + 1}&year=${year}&itemsPerPage=${itemsPerPage}`;
                }
            });
            pagination.appendChild(nextBtn);
        }

        // Jahr-Selectbox initialisieren
        document.getElementById("year-select").value = currentYear;
        document.getElementById("year-select").addEventListener("change", (e) => {
            currentYear = e.target.value;
            currentPage = 1; // Bei Jahreswechsel zurück auf Seite 1
            window.location.search = `?page=${currentPage}&year=${currentYear}&itemsPerPage=${itemsPerPage}`;
        });

        renderPage(currentPage, currentYear);
    </script>
</body>

</html>
