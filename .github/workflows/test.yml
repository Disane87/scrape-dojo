name: Test

on:
  workflow_call:
  pull_request:
    paths-ignore:
      - 'apps/docs/**'
      - '**/*.md'

env:
  NX_CLOUD_ACCESS_TOKEN: ''
  NX_NO_CLOUD: 'true'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-api:
    name: Test API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run API tests with coverage
        run: cd apps/api && npx vitest run --coverage

      - name: Upload API coverage artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: api-coverage
          path: coverage/apps/api
          if-no-files-found: ignore

  test-ui:
    name: Test UI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run UI tests with coverage
        run: npx vitest run --root apps/ui --coverage

      - name: Upload UI coverage artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ui-coverage
          path: coverage/apps/ui
          if-no-files-found: ignore
