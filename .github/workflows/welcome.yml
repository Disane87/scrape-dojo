name: 'Welcome'

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            👋 Thanks for opening your first issue! We appreciate your contribution to Scrape Dojo.

            A maintainer will review this shortly. In the meantime, please make sure you've:
            - ✅ Searched for existing issues
            - ✅ Included reproduction steps (if it's a bug)
            - ✅ Described the expected behavior

            Check out our [Contributing Guide](https://github.com/Disane87/scrape-dojo/blob/main/CONTRIBUTING.md) for more info!
          pr-message: |
            👋 Thanks for opening your first pull request! We're excited to have you contribute to Scrape Dojo.

            A maintainer will review this shortly. Please make sure:
            - ✅ Your code follows the project's code style
            - ✅ You've tested your changes locally
            - ✅ All existing tests still pass

            Check out our [Contributing Guide](https://github.com/Disane87/scrape-dojo/blob/main/CONTRIBUTING.md) for more info!
