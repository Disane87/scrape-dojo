name: Docker Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  docker:
    name: Build & Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute version
        id: version
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Compute GHCR owner (lowercase)
        id: ghcr
        shell: bash
        run: |
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.ghcr.outputs.owner }}/scrape-dojo:api-${{ steps.version.outputs.version }}
            ghcr.io/${{ steps.ghcr.outputs.owner }}/scrape-dojo:api-latest

      - name: Build & push UI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/ui/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.ghcr.outputs.owner }}/scrape-dojo:ui-${{ steps.version.outputs.version }}
            ghcr.io/${{ steps.ghcr.outputs.owner }}/scrape-dojo:ui-latest
