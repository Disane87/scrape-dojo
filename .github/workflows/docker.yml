name: Docker

on:
  workflow_call:
    inputs:
      version:
        description: The version tag to use for the Docker image
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build_and_push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute GHCR owner (lowercase)
        id: ghcr
        shell: bash
        run: |
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push combined image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ steps.ghcr.outputs.owner }}/scrape-dojo:${{ inputs.version }}
            ghcr.io/${{ steps.ghcr.outputs.owner }}/scrape-dojo:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
