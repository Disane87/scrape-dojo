name: Release

on:
  workflow_call:
    outputs:
      new_release_published:
        description: Whether a new release was published
        value: ${{ jobs.semantic_release.outputs.new_release_published }}
      new_release_version:
        description: The new release version (without v prefix)
        value: ${{ jobs.semantic_release.outputs.new_release_version }}

env:
  NX_CLOUD_ACCESS_TOKEN: ''

jobs:
  semantic_release:
    name: Semantic Release
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.check.outputs.new_release_published }}
      new_release_version: ${{ steps.check.outputs.new_release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm nx build api --skip-nx-cache

      - name: Build UI
        run: pnpm nx build ui --skip-nx-cache

      - name: Get latest tag before release
        id: before
        run: |
          git fetch --tags
          echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm semantic-release

      - name: Check for new release
        id: check
        run: |
          git fetch --tags
          NEW_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo '')
          if [ "$NEW_TAG" != "${{ steps.before.outputs.tag }}" ] && [ -n "$NEW_TAG" ]; then
            echo "new_release_published=true" >> "$GITHUB_OUTPUT"
            echo "new_release_version=${NEW_TAG#v}" >> "$GITHUB_OUTPUT"
            echo "New release: $NEW_TAG"
          else
            echo "new_release_published=false" >> "$GITHUB_OUTPUT"
            echo "No new release"
          fi
