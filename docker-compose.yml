# ============================================
# Scrape Dojo - Docker Compose
# Development and Production Setup
# ============================================

services:
  # ----------------------------------------
  # API Backend (NestJS + Puppeteer)
  # ----------------------------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: scrape-dojo-api:latest
    container_name: scrape-dojo-api
    restart: unless-stopped
    ports:
      - "3030:3000"
    environment:
      # Node environment (used by some parts of backend)
      - NODE_ENV=production
      # Scrape Dojo environment (used by health/puppeteer)
      - SCRAPE_DOJO_NODE_ENV=production
      - SCRAPE_DOJO_PORT=3000
      - SCRAPE_DOJO_DOCKER_ENV=true
      # Frontend URL for OIDC redirects (UI runs on port 8080 in Docker)
      - SCRAPE_DOJO_FRONTEND_URL=${SCRAPE_DOJO_FRONTEND_URL:-http://localhost:8080}
      
      # Database Configuration
      - DB_TYPE=${DB_TYPE:-sqlite}
      - DB_DATABASE=${DB_DATABASE:-./data/scrape-dojo.db}
      - DB_SYNCHRONIZE=${DB_SYNCHRONIZE:-true}
      - DB_LOGGING=${DB_LOGGING:-false}
      
      # Secrets encryption key (256-bit hex, 64 characters)
      # Generate: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      - SCRAPE_DOJO_ENCRYPTION_KEY=${SCRAPE_DOJO_ENCRYPTION_KEY}
      # Optional: CORS origins (comma-separated)
      - SCRAPE_DOJO_CORS_ORIGIN=${SCRAPE_DOJO_CORS_ORIGIN:-}
      # Optional: Reverse proxy trust level
      - SCRAPE_DOJO_TRUST_PROXY=${SCRAPE_DOJO_TRUST_PROXY:-1}
      
      # Authentication Settings
      - SCRAPE_DOJO_AUTH_ENABLED=${SCRAPE_DOJO_AUTH_ENABLED:-true}
      - SCRAPE_DOJO_AUTH_REQUIRE_MFA=${SCRAPE_DOJO_AUTH_REQUIRE_MFA:-true}
      - SCRAPE_DOJO_AUTH_JWT_SECRET=${SCRAPE_DOJO_AUTH_JWT_SECRET}
      - SCRAPE_DOJO_AUTH_REFRESH_TOKEN_SECRET=${SCRAPE_DOJO_AUTH_REFRESH_TOKEN_SECRET}
      - SCRAPE_DOJO_AUTH_ACCESS_TOKEN_EXPIRY=${SCRAPE_DOJO_AUTH_ACCESS_TOKEN_EXPIRY:-15m}
      - SCRAPE_DOJO_AUTH_REFRESH_TOKEN_EXPIRY=${SCRAPE_DOJO_AUTH_REFRESH_TOKEN_EXPIRY:-7d}
      - SCRAPE_DOJO_AUTH_RATE_LIMIT_WINDOW_MS=${SCRAPE_DOJO_AUTH_RATE_LIMIT_WINDOW_MS:-60000}
      - SCRAPE_DOJO_AUTH_RATE_LIMIT_MAX=${SCRAPE_DOJO_AUTH_RATE_LIMIT_MAX:-30}
      - SCRAPE_DOJO_AUTH_API_KEY=${SCRAPE_DOJO_AUTH_API_KEY:-}
      
      # MFA Configuration
      - SCRAPE_DOJO_AUTH_MFA_ISSUER=${SCRAPE_DOJO_AUTH_MFA_ISSUER:-Scrape Dojo}
      - SCRAPE_DOJO_AUTH_MFA_CHALLENGE_SECRET=${SCRAPE_DOJO_AUTH_MFA_CHALLENGE_SECRET}
      - SCRAPE_DOJO_AUTH_MFA_ENCRYPTION_KEY=${SCRAPE_DOJO_AUTH_MFA_ENCRYPTION_KEY}
      
      # OIDC / SSO Configuration
      - SCRAPE_DOJO_AUTH_OIDC_ENABLED=${SCRAPE_DOJO_AUTH_OIDC_ENABLED:-false}
      - SCRAPE_DOJO_AUTH_OIDC_ISSUER_URL=${SCRAPE_DOJO_AUTH_OIDC_ISSUER_URL:-}
      - SCRAPE_DOJO_AUTH_OIDC_CLIENT_ID=${SCRAPE_DOJO_AUTH_OIDC_CLIENT_ID:-}
      - SCRAPE_DOJO_AUTH_OIDC_CLIENT_SECRET=${SCRAPE_DOJO_AUTH_OIDC_CLIENT_SECRET:-}
      - SCRAPE_DOJO_AUTH_OIDC_REDIRECT_URI=${SCRAPE_DOJO_AUTH_OIDC_REDIRECT_URI:-http://localhost:3000/auth/oidc/callback}
      - SCRAPE_DOJO_AUTH_OIDC_SCOPES=${SCRAPE_DOJO_AUTH_OIDC_SCOPES:-openid profile email}
      - SCRAPE_DOJO_AUTH_OIDC_PROVIDER_NAME=${SCRAPE_DOJO_AUTH_OIDC_PROVIDER_NAME:-OIDC Provider}
    volumes:
      # Persist data directories (adjust paths for pptruser home)
      - ./data:/home/pptruser/app/data
      - ./downloads:/home/pptruser/app/downloads
      - ./logs:/home/pptruser/app/logs
      - ./browser-data:/home/pptruser/app/browser-data
      # Mount config (writable - app creates scrapes.json)
      - ./config:/home/pptruser/app/config
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - scrape-dojo-network

  # ----------------------------------------
  # UI Frontend (Angular + Nginx)
  # ----------------------------------------
  ui:
    build:
      context: .
      dockerfile: apps/ui/Dockerfile
    image: scrape-dojo-ui:latest
    container_name: scrape-dojo-ui
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - scrape-dojo-network

networks:
  scrape-dojo-network:
    driver: bridge
